<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>
    <div id="contenedor">
        <header>
            <center>
                <h1 class="titulo-principal">GOLDEN EXPERIENCE</h1>

                <div class="contenedorMenu">
                    <input type="checkbox" id="menu">

                    <label for="menu" class="menuHamburguesa">

                    <nav class="navegacion">

    <!--

    <div class="margenes">
        <img src="../Imagenes/banner hombre.webp" alt="Perfume para hombre - Fragancias exclusivas masculinas"
            class="banRes-hombre-mujer">
    </div>

    <div class="card-deck" id="card-deck-hombre">
    </div>

    <div>
        <img src="../Imagenes/banner mujer.webp" alt="Perfume para mujer - Fragancias exclusivas femeninas"
            class="banRes-hombre-mujer">
    </div>

    <div class="card-deck" id="card-deck-mujer">
        
    </div>
    <script>

        function createCard(numero, data) {
            let cardHTML = `
    <div class="card card-perfume">
       
        <div id="miCarrusel_${numero}" class="carousel slide" data-bs-ride="carousel">
    
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#miCarrusel_${numero}" data-bs-slide-to="0" class="active"
                    aria-current="true"></button>
                <button type="button" data-bs-target="#miCarrusel_${numero}" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#miCarrusel_${numero}" data-bs-slide-to="2"></button>
            </div>
    
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="${data.imagenes[0]}" class="d-block" alt="Slide 1">
                </div>
                <div class="carousel-item">
                    <img src="${data.imagenes[1]}" class="d-block" alt="Slide 2">
                </div>
                <div class="carousel-item">
                    <img src="${data.imagenes[2]}" class="d-block" alt="Slide 3">
                </div>
                
            </div>
    
            <button class="carousel-control-prev" type="button" data-bs-target="#miCarrusel_${numero}"
                data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
    
            <button class="carousel-control-next" type="button" data-bs-target="#miCarrusel_${numero}"
                data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Siguiente</span>
            </button>
        </div>
    
        <div class="card-body">
            <h5 class="card-title"> ${data.titulo} </h5>
            <p class="card-text"> ${data.descripcion} </p>
        </div>

        `
            let footer = `<div class="card-footer">
        <small class="text-muted"> ${data.footer} </small>
        </div>`

            if (data.footer != "") {
                cardHTML += footer;
            }
            cardHTML += `</div>`;
            return cardHTML;

        }

        let cardsData = [
            {
                titulo: "<a href='../Paginas/AcquaDiGio.html' target ='_blank' class = 'Titulo-perfume'>Acqua di gio</a>", 
                descripcion: "holaqhace",
                footer: "Patrocinado",
                forMen: true,
                imagenes: [
                    "../Imagenes/Acqua di gio/acqua di gio (2).webp",
                    "../Imagenes/Acqua di gio/acqua di gio (3).webp",
                    "../Imagenes/Acqua di gio/acqua di gio (4).webp"
                ]
            },
            {
                titulo: "Bleu de Chanel",
                descripcion: ":v",
                footer: "",
                forMen: true,
                imagenes: [
                    "../Imagenes/perfume 1.jpeg",
                    "../Imagenes/perfume 2.jpeg",
                    "../Imagenes/perfume 3.jpeg"
                ]
            },
            {
                titulo: "Ya tu save",
                descripcion: "waa",
                footer: "waaaaa",
                forMen: true,
                imagenes: [
                    "../Imagenes/perfume 4.jpeg",
                    "../Imagenes/perfume 5.jpeg",
                    "../Imagenes/perfume 6.jpeg"
                ]
            },
            {
                titulo: "asd",
                descripcion: "asra",
                footer: "sdfgs",
                forMen: false,
                imagenes: [
                    "../Imagenes/perfume 4.jpeg",
                    "../Imagenes/perfume 5.jpeg",
                    "../Imagenes/perfume 6.jpeg"
                ]
            },
            {
                titulo: "fsaf",
                descripcion: "asf",
                footer: "sdfgs",
                forMen: false,
                imagenes: [
                    "../Imagenes/perfume 4.jpeg",
                    "../Imagenes/perfume 5.jpeg",
                    "../Imagenes/perfume 6.jpeg"
                ]
            }
        ]



        let cardsContainerHombre = document.getElementById("card-deck-hombre");
        let cardsContainerMujer = document.getElementById("card-deck-mujer");


        for (let i = 0; i < cardsData.length; i++) {
            if (cardsData[i].forMen) {
                cardsContainerHombre.innerHTML += createCard(i, cardsData[i]);
            } else {
                cardsContainerMujer.innerHTML += createCard(i, cardsData[i]);
            }
        }





    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
